<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{.Name}} - Groupie Tracker</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #121212; 
            color: #fff; 
            margin: 0; 
            padding: 40px 20px; 
        }
        .container {
            max-width: 800px;
            margin: 0 auto; /* Centers the whole page */
        }
        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .profile-img {
            width: 250px;
            height: 250px;
            border-radius: 50%; /* Makes the image a perfect circle */
            object-fit: cover;
            border: 4px solid #1db954; /* Spotify green accent */
        }
        .profile-header h1 {
            font-size: 3rem;
            margin: 15px 0 5px 0;
        }
        
        /* Grid for the data sections */
        .profile-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .detail-card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
        }
        .detail-card h2 {
            color: #1db954;
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        ul {
            list-style-type: none; /* Removes default bullets */
            padding: 0;
        }
        ul li {
            padding: 5px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #1db954;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER: Image and Name -->
        <header class="profile-header">
            <img src="{{.Image}}" alt="{{.Name}}" class="profile-img">
            <h1>{{.Name}}</h1>
            <p>Formed in {{.CreationDate}} | First Album: {{.FirstAlbum}}</p>
        </header>

        <!-- MAIN CONTENT: Grids for different data types -->
        <main class="profile-details">
            <section class="detail-card">
                <h2>Members</h2>
                <ul>
                    {{range .Members}}
                        <li>{{.}}</li>
                    {{end}}
                </ul>
            </section>
            
            <!-- We will add Locations and Dates here later -->
            <section>
                <h2>Concert Location and Dates</h2>
                <ul>
                    {{range location$ dates$ := .Relation.DateLocation}}
                </ul>
            </section>
        </main>
        
        <a href="/" class="back-link">← Back to Artists</a>
    </div>
</body>
</html>
